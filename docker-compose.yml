services:

  db:
    image: postgres:16-alpine
    container_name: vet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 28demarzo
      POSTGRES_DB: veterinaria
    volumes:
      - vet_pgdata:/var/lib/postgresql/data
    # puerto solo interno — el backend accede por la red de Docker
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d veterinaria"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: vet_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:28demarzo@db:5432/veterinaria
    volumes:
      - vet_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  vet_pgdata:
  vet_uploads:
